<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AES Parts for Job Barcode Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="barcode.ico">
    <link rel="stylesheet" href="style.css">
        <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/hold-label.css">

</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top navbar-dark bg-dark">
        <a class="navbar-brand" href="#"><img src="./images/logo.png" height="36"></a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarText"
            aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav mr-auto mt-2 mt-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Listing Tool</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="hold-label.html">Job Label - 3x4</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="barcode-3x4.html">Barcodes - 3x4</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="barcode-1x3.html">Barcodes - 1x3</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="barcode-4x8.html">Barcodes - 4x8</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="g-code-gen.html">G Code Generator</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="controls">
        Part Number: <input type="text" id="barcodeData" class="inputBox" placeholder="P1891" onchange="generate()"><br>
        Job Name: <input type="text" id="appendText" class="inputBox" placeholder="Staters 57" onchange="generate()"><br>
        Quantity: <input type="text" id="appendQty" class="inputBox" placeholder="5" onchange="generate()"><br>
        <button onclick="generate()">Generate</button>
    </div>

    <div id="printArea" class="print-container">
        <svg id="barcode"></svg>
        <div id="extraText" class="label-text"></div>
        <div id="qtyText" class="label-text"></div>
    </div>

    <script src="js/JsBarcode.all.min.js"></script>
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="./js/jquery-3.2.1.slim.min.js"></script>
    <script src="./js/popper.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>
    <script src="js/holdLabelScript.js"></script>
</body>

</html>
